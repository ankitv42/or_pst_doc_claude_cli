name: ORCA Eval Gate

# Layer 3 — runs the retrieval eval automatically on every push/PR to main.
# Only the retrieval eval runs in CI (it is free and needs no API key).
# The RAGAS-style and judge evals need a GROQ_API_KEY; enable them by adding
# the key as a GitHub secret and uncommenting the step below.

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'agents/**', 'evals/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs/**', 'agents/**', 'evals/**' ]
  workflow_dispatch:

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install chromadb sentence-transformers rank-bm25 python-dotenv

      - name: Build the RAG knowledge base
        run: python docs/rag/ingest.py --reset
        env:
          PYTHONPATH: .

      - name: Run retrieval eval (CI gate)
        run: python evals/run_retrieval_eval.py --ci
        env:
          PYTHONPATH: .

      # ── optional: RAGAS-style + judge evals (need GROQ_API_KEY secret) ─────
      # - name: Run RAGAS-style eval
      #   run: python evals/run_ragas_eval.py --limit 3
      #   env:
      #     PYTHONPATH: .
      #     GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      #
      # - name: Composite score gate
      #   run: python evals/composite_score.py --ci
      #   env:
      #     PYTHONPATH: .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
          retention-days: 30