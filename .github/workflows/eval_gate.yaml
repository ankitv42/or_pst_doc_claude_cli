name: ORCA Eval Gate

# Full eval suite on every push/PR to main.
# Runs: retrieval + RAGAS + LLM-judge + composite gate (>= 0.75).
# Requires GROQ_API_KEY set as a GitHub Actions repository secret:
#   Settings > Secrets and variables > Actions > New repository secret

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  eval-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install eval dependencies
        run: |
          pip install --upgrade pip
          pip install "chromadb==1.1.1" "sentence-transformers==5.5.0" "rank-bm25==0.2.2" \
            python-dotenv einops langchain-groq langchain-core

      - name: Run full eval suite (retrieval + RAGAS + judge + composite)
        run: python evals/eval_main.py --ragas-limit 3 --judge-limit 5 --ci
        env:
          PYTHONPATH: .
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: evals/results/
          retention-days: 30
