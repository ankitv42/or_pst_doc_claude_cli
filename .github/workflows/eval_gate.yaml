name: ORCA Eval Gate

# Layer 3 — runs the retrieval eval on every push/PR to main.
# It uses the PRE-BUILT ChromaDB index committed at db/chroma (no ingest in CI),
# so CI stays fast and needs no heavy parsing libraries (docling, einops, etc.).

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'agents/**', 'evals/**', 'db/chroma/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs/**', 'agents/**', 'evals/**', 'db/chroma/**' ]
  workflow_dispatch:

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install eval dependencies
        run: |
          pip install --upgrade pip
          pip install "chromadb==1.1.1" "sentence-transformers==5.5.0" "rank-bm25==0.2.2" python-dotenv einops

      - name: Run retrieval eval (CI gate, uses pre-built index)
        run: python evals/run_retrieval_eval.py --ci
        env:
          PYTHONPATH: .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
          retention-days: 30