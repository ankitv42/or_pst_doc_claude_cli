name: ORCA Eval Gate

# PR gate — runs on every push/PR to main.
# Layer 1 (retrieval, free) + composite score in retrieval-only mode.
# No GROQ_API_KEY needed. Uses pre-built ChromaDB index (no re-ingest).
# For the full suite (RAGAS + judge) see eval_nightly.yaml.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install eval dependencies
        run: |
          pip install --upgrade pip
          pip install "chromadb==1.1.1" "sentence-transformers==5.5.0" "rank-bm25==0.2.2" python-dotenv einops

      - name: Layer 1 — retrieval eval (hard gate >= 70% pass rate, 0 leaks)
        run: python evals/run_retrieval_eval.py --ci
        env:
          PYTHONPATH: .

      - name: Composite score — retrieval-only mode (no RAGAS needed)
        run: python evals/composite_score.py --ci
        env:
          PYTHONPATH: .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
          retention-days: 30